<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — conn</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0b1f1c;
      --muted: #5a6f69;
      --line: #c5d4ce;
      --paper: #e7f0ec;
      --surface: #f3f8f5;
      --signal: #0d8f6a;
      --phosphor: #2dd4a0;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --sans: "Source Sans 3", Georgia, sans-serif;
      --display: "Space Grotesk", var(--sans);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(ellipse 70% 45% at 8% -8%, rgba(13, 143, 106, 0.12), transparent 55%),
        linear-gradient(180deg, var(--surface), var(--paper));
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid var(--line);
      background: rgba(243, 248, 245, 0.88);
      backdrop-filter: blur(12px);
    }

    .nav-brand {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.04em;
      text-decoration: none;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
    }

    .nav-brand svg { width: 1.55rem; height: 1.55rem; }

    .nav a:not(.nav-brand) {
      color: var(--signal);
      font-weight: 600;
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .panel {
      max-width: 28rem;
      width: 100%;
      text-align: left;
    }

    .code {
      font-family: var(--mono);
      font-size: 0.9rem;
      background: #0b1f1c;
      color: #d7ebe3;
      padding: 1.1rem 1.2rem;
      margin-bottom: 1.5rem;
      border: 1px solid #1a3530;
    }

    .code .prompt { color: var(--phosphor); }
    .code .err { color: #ff8f8f; }

    h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 6vw, 2.75rem);
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.65rem;
    }

    p {
      color: var(--muted);
      margin-bottom: 1.4rem;
      line-height: 1.55;
    }

    .btn {
      display: inline-flex;
      padding: 0.7rem 1.1rem;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--signal); }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#0B1F1C"/>
        <path d="M9 10.5 L16.5 16 L9 21.5" stroke="#2DD4A0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="18.5" y1="21.5" x2="24" y2="21.5" stroke="#2DD4A0" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      conn
    </a>
    <a href="/">Home</a>
  </nav>
  <main>
    <div class="panel">
      <div class="code">
        <div><span class="prompt">$</span> conn to this-page</div>
        <div class="err">Error: alias 'this-page' does not exist!</div>
      </div>
      <h1>404 — not connected</h1>
      <p>This path isn’t in your host list. Head home and pick a documented route.</p>
      <a class="btn" href="/">← Back to conn</a>
    </div>
  </main>
</body>
</html>
