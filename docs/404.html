<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — conn</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-elevated: #141416;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --accent: #22c55e;
      --border: #27272a;
      --terminal-bg: #18181b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover { color: #4ade80; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      padding: 1.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--text);
    }

    .logo svg {
      width: 1.5rem;
      height: 1.5rem;
      flex-shrink: 0;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .message {
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 360px;
    }

    .terminal {
      background: var(--terminal-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      text-align: left;
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .terminal .error { color: #ef4444; }
    .terminal .hint { color: var(--text-muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: #4ade80;
      color: var(--bg);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <header class="container">
    <a href="/" class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="6" fill="var(--terminal-bg)" stroke="var(--border)" stroke-width="1"/>
        <path d="M10 10 L18 16 L10 22" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="20" y1="22" x2="26" y2="22" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      conn
    </a>
  </header>

  <main>
    <span class="code">404</span>
    <h1>Connection not found</h1>
    <p class="message">This page doesn't exist. Maybe the host is down, or you mistyped the alias.</p>

    <div class="terminal">
      <div class="error">$ conn to this-page</div>
      <div class="hint">Error: alias 'this-page' does not exist!</div>
      <div class="hint">Use 'conn list' to see available connections.</div>
    </div>

    <a href="/" class="btn">← Back home</a>
  </main>
</body>
</html>
